<ng-container *ngIf="nft$ | async as nft">

  <h1 class="mt-3">{{ nft.name }} <small class="text-muted font-weight-light">(Token #{{ nft.tokenId }})</small></h1>

  <iframe *ngIf="nft.animation_url" [src]="nft.animation_url | safeResourceUrl" width="400" height="400"></iframe>
  <img *ngIf="!nft.animation_url" [src]="nft.image">

  <p class="mt-4" [innerHTML]="nft.description | parseMarkdown"></p>

  {{ nft | json }}

</ng-container>

<app-loading-indicator *ngIf="loading" class="mb-5" text="Loading token details…"></app-loading-indicator>


<a routerLink="/" class="btn btn btn-primary fw-bold mb-4" >« Back</a>
