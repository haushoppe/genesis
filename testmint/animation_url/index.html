<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="style.css">
  <title>Rotating Cube</title>
</head>
<body>
  <main class="main">
    <div class="cube__section">
      <div class="cube">
        <div class="cube__container">
          <div class="cube__face cube__face--front">
            <img class="image__container" src="0.jpg" />
          </div>
          <div class="cube__face cube__face--back">
            <img class="image__container" src="1.jpg" />
          </div>
          <div class="cube__face cube__face--left">
            <img class="image__container" src="2.jpg" />
          </div>
          <div class="cube__face cube__face--right">
            <img class="image__container" src="3.jpg" />
          </div>
          <div class="cube__face cube__face--top">
            <img class="image__container" src="4.jpg" />
          </div>
          <div class="cube__face cube__face--bottom">
            <img class="image__container" src="5.jpg" />
          </div>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
