name: Build Scales Dashboard Frontend

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/scales-dashboard-frontend/**'
      - 'libs/**'
      - '*.json'

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-node@v3
      with:
        node-version: 16.15.1

    - run: npm install
    - run: npm run build:scales-dashboard-frontend:production
    - name: Deploy Frontend to `haushoppe/scales-dashboard-frontend-build` repo
      env:
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
      run: |
        npx angular-cli-ghpages --message="Auto-generated commit" --repo=https://github.com/haushoppe/scales-dashboard-frontend-build.git --branch=main --dir=dist/apps/scales-dashboard-frontend --name="The Buildbot" --email=noreply@haushoppe.art
