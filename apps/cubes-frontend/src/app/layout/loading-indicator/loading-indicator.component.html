@if (state(); as s) {
  @if (s.submitStatus === SubmitStatus.Submitting) {
    <div>
      <span class="spinner-border" role="status" style="margin-bottom: -6px"></span>
      @if (sendDataText(); as text) {
        <span class="inline-block ms-3" style="font-size: 1.2em">{{ text }}</span>
      }
    </div>
  }
  @if (s.submitStatus === SubmitStatus.Failure) {
    <app-alert type="danger">
      {{ s.submitErrorText }}
    </app-alert>
  }
}
