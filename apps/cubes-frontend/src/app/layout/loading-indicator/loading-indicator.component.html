@if (state) { @if (state.submitStatus === SubmitStatus.Submitting) {
<div>
  <span class="spinner-border" role="status" style="margin-bottom: -6px"></span>
  @if (sendDataText) {
  <span class="inline-block ms-3" style="font-size: 1.2em">{{
    sendDataText
  }}</span>
  }
</div>
} @if (state.submitStatus === SubmitStatus.Failure) {
<app-alert type="danger">
  {{ state.submitErrorText }}
</app-alert>
} }
