name: Build Three.js Test Cube

on:
  push:
    branches: [ main ]
    paths:
      - 'z_extra/prototypes/threejs-test/**'

jobs:

  build:

    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./z_extra/prototypes/threejs-test

    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-node@v3
      with:
        node-version: 16.x

    - run: npm install
    - run: npm run build
    - name: Deploy Page to cube-threejs-test-build repo
      env:
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
      run: |
        npx angular-cli-ghpages --repo=https://github.com/haushoppe/cube-threejs-test-build.git --branch=main --name="The Buildbot" --email=noreply@haushoppe.art --message="Auto-generated commit"

