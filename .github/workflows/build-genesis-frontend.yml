name: Build Genesis Frontend

on:
  push:
    branches: [ main ]
    # paths:
    #   - 'apps/genesis-frontend/**'
    #   - 'libs/**'
    #   - '*.json'

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-node@v3
      with:
        node-version: 16.15.1

    - run: npm install
    - run: npx kendo-ui-license activate
    - run: npm run build:genesis-frontend:production
    - name: Deploy Frontend to `haushoppe/genesis-frontend-build` repo
      env:
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
      run: |
        npx angular-cli-ghpages --message="Auto-generated commit" --repo=https://github.com/haushoppe/genesis-frontend-build.git --branch=main --dir=dist/apps/genesis-frontend --name="The Buildbot" --email=noreply@haushoppe.art
