name: Build Cube API

on:
  push:
    branches: [ main ]

jobs:

  build:

    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./cube-workspace

    steps:
    - uses: actions/checkout@v2
    - uses: actions/setup-node@v1
      with:
        node-version: 16.x

    # This caches all of your node_modules folders throughout your repository,
    # and busts the cache every time a package-lock.json file changes.
    # https://dev.to/mpocock1/how-to-cache-nodemodules-in-github-actions-with-yarn-24eh
    - name: Cache node modules
      uses: actions/cache@v2
      with:
        path: '**/node_modules'
        key: ${{ runner.os }}-node_modules-${{ hashFiles('**/package-lock.json') }}

    - run: npm install
    - run: npm run build
    - run: cp package-heroku.json dist/apps/backend/package.json
    - name: Deploy API to second repo
      env:
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
      run: |
        npx angular-cli-ghpages --repo=https://github.com/haushoppe/cube-website-build.git --branch=main --dir=dist/apps/backend --name="The Buildbot" --email=noreply@haushoppe.art

