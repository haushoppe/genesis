name: Build Cubes Frontend

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/cubes-frontend/**'
      - 'libs/**'
      - '*.json'

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-node@v3
      with:
        node-version: 18

    - run: npm install --force
    - run: npm install @nrwl/nx-linux-x64-gnu  --force #bugfix broken build! 😕
    - run: npm test:cubes-frontend
    - run: npm run build:cubes-frontend:production
    - name: Deploy Frontend to `haushoppe/cubes-frontend-build` repo
      env:
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
      run: |
        npx angular-cli-ghpages --message="Auto-generated commit" --repo=https://github.com/haushoppe/cubes-frontend-build.git --branch=main --dir=dist/apps/cubes-frontend --name="The Buildbot" --email=noreply@haushoppe.art --no-silent
