<a class="wrapper" [routerLink]="['/nft', nft?.tokenId]">

  <div class="resize-container">
    <img [ngSrc]="nft?.image || ''" class="img-fluid" width="400" height="400">
  </div>

  <div class="nft-name one-line fs-6 lh-sm mt-2 ps-1 one-line" title="{{ nft?.name }}">
    {{ nft?.name }}
  </div>
</a>
