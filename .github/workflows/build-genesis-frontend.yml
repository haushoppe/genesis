name: Build Genesis Frontend

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/genesis-frontend/**'
      - 'libs/**'
      - '*.json'
      - '.github/workflows/build-genesis-frontend.yml'

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-node@v3
      with:
        node-version: 18

    - run: npm install --force
    - run: npm install @nrwl/nx-linux-x64-gnu  --force #bugfix broken build! 😕
    - run: npx kendo-ui-license activate
      env:
        KENDO_UI_LICENSE: ${{ secrets.KENDO_UI_LICENSE }}
    - run: npm run test:genesis-frontend
    - run: npm run build:genesis-frontend:production
    - name: Deploy Frontend to `haushoppe/genesis-frontend-build` repo
      env:
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
      run: |
        npx angular-cli-ghpages --repo=https://github.com/haushoppe/genesis-frontend-build.git --branch=main --dir=dist/apps/genesis-frontend --name="The Buildbot" --email=noreply@haushoppe.art --no-notfound --no-nojekyll
