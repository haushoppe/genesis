name: Build Backend

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/backend/**'
      - '*.json'

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-node@v3
      with:
        node-version: 18

    - run: npm install
    - run: npm install @nrwl/nx-linux-x64-gnu #bugfix broken build! 😕
    - run: npm run build:backend:production
    - name: Deploy Backend to `haushoppe/backend-build` repo
      env:
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
      run: |
        npx angular-cli-ghpages --message="Auto-generated commit" --repo=https://github.com/haushoppe/backend-build.git --branch=main --dir=dist/apps/backend --name="The Buildbot" --email=noreply@haushoppe.art

